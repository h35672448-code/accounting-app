<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ทะเบียนคุม</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap');

body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:
    radial-gradient(circle at 12% 12%, rgba(31,162,61,.18), transparent 34%),
    radial-gradient(circle at 86% 18%, rgba(255,208,0,.18), transparent 32%),
    radial-gradient(circle at 78% 82%, rgba(196,32,32,.18), transparent 30%),
    linear-gradient(135deg, #fff7df 0%, #fff3d1 35%, #fff8e8 100%);
  color:#3a2f23;
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(120deg,
      rgba(31,162,61,.06) 0%,
      rgba(31,162,61,.06) 20%,
      rgba(255,208,0,.06) 20%,
      rgba(255,208,0,.06) 40%,
      rgba(196,32,32,.06) 40%,
      rgba(196,32,32,.06) 60%,
      rgba(31,162,61,.06) 60%,
      rgba(31,162,61,.06) 80%,
      rgba(255,208,0,.06) 80%,
      rgba(255,208,0,.06) 100%);
  mix-blend-mode:multiply;
  opacity:.75;
  z-index:-1;
}

/* ลายมัดย้อมจุ่มหมึกแบบจางมาก */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,150,0,0.05) 0%, transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,200,0,0.05) 0%, transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(200,0,0,0.05) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

/* ทำให้เนื้อหาลอยเหนือพื้นลาย */
.card > *{
  position:relative;
  z-index:1;
}

/* กล่องหลัก */
.card{
  background:#ffffffee;
  border-radius:18px;
  padding:30px;
  margin:40px auto;
  max-width:1100px;
  box-shadow:0 18px 38px rgba(67,46,25,.20);
  border:2px solid #f2dba2;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:0;
  height:9px;
  background:linear-gradient(90deg,#1fa23d 0%, #ffd000 50%, #c42020 100%);
  border-top-left-radius:18px;
  border-top-right-radius:18px;
}

/* หัวเรื่อง */
.main-title{
  font-size:30px;
  text-align:center;
  color:#1fa23d;
  margin:0;
  text-shadow:0 2px 0 rgba(255,255,255,.7);
}

.sub-title{
  text-align:center;
  font-size:14px;
  color:#c42020;
  margin-top:6px;
  font-style:italic;
}

.title-frame{
  border-bottom:4px solid;
  border-image: linear-gradient(to right,#1fa23d,#ffd000,#c42020) 1;
  padding-bottom:12px;
  margin-bottom:20px;
}

/* ช่องกรอก */
input,textarea{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #e0d6c0;
  margin-bottom:12px;
  background:#fffaf0;
  font-size:14px;
  box-shadow:none;
  transition:0.3s;
}

input:focus,textarea:focus{
  outline:none;
  border-color:#1fa23d;
  box-shadow:0 0 10px rgba(31,162,61,0.3);
}

/* ปุ่มหวานสดใส */
button{
  padding:8px 18px;
  border:none;
  border-radius:25px;
  cursor:pointer;
  font-weight:600;
  color:#fff;
  background:linear-gradient(90deg,#1fa23d,#ffd000,#c42020);
  box-shadow:0 4px 12px rgba(66,46,23,.22);
  transition:0.3s;
}

button:hover{
  transform:scale(1.07);
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ตาราง */
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  background:#fffdfa;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(80,54,26,.12);
}

th{
  background:linear-gradient(90deg,#1fa23d,#ffd000,#c42020);
  color:#fff;
}

th,td{
  padding:8px;
  border-bottom:1px solid #f0e4c2;
  text-align:center;
}

tr:nth-child(even){
  background:#fff3dc;
}

tr:hover{
  background:#ffe9bd;
}

.field-hint{
  margin-top:-8px;
  margin-bottom:10px;
  font-size:12px;
  color:#6b5a47;
}
</style>
</head>
<body>

<div id="loginBox" class="card">
<h3>🔐 เข้าสู่ระบบ</h3>
<input id="password" type="password">
<button type="button" onclick="doLogin()">เข้าสู่ระบบ</button>
<p id="msg"></p>
</div>

<div id="app" style="display:none;">

<div class="card">
<div class="title-box">
  <div class="title-frame">
    <h1 class="main-title">
      📘 ทะเบียนคุมบันทึกการปรับปรุงรายการบัญชี
    </h1>
    <div class="sub-title">
      ✨ ระบบบริหารจัดการข้อมูลบัญชีดิจิทัล
    </div>
  </div>
</div>
🗓️ วันที่
<input id="date" type="date">

📄 เลขที่เอกสาร
<input id="doc">

🧾 รายการ
<textarea id="item"></textarea>

🟢 RE
<textarea id="re_detail"></textarea>
<div class="field-hint">RE = รับเงิน</div>

🟡 JR
<textarea id="jr_detail"></textarea>
<div class="field-hint">JR = ปรับปรุงบัญชีเงินสด</div>

🔵 JV
<textarea id="jv_detail"></textarea>
<div class="field-hint">JV = ปรับปรุงบัญชีทั่วไป</div>

🔴 PP
<textarea id="pp_detail"></textarea>
<div class="field-hint">PP = จ่ายเงินออก</div>
💰 จำนวนเงิน
<input id="amount" type="text" inputmode="decimal" placeholder="0.00">

📘 Dr
<input id="dr">

📗 Cr
<input id="cr">

📌 หมายเหตุ
<input id="note">

<button type="button" onclick="save()">💾 บันทึก</button>
<button type="button" onclick="clearForm()">🧹 ล้างฟอร์ม</button>

<hr>

<input type="file" id="importFile" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
<button type="button" onclick="importCSV()">📂 นำเข้าไฟล์ Excel (.xlsx)</button>

</div>

<div class="card">

<button type="button" onclick="toggleFilter()">🔎 ตัวกรองขั้นสูง</button>
<button type="button" onclick="toggleAll()">📊 ดูทั้งหมด</button>
<button type="button" onclick="downloadSelected()">⬇️ โหลดที่เลือก</button>
<button type="button" onclick="deleteSelected()">🗑️ ลบที่เลือก</button>

<div id="filterBox" style="display:none; margin-top:15px;">
  📋 จากวันที่
  <input id="dateStart" type="date">

📌 ถึงวันที่
  <input id="dateEnd" type="date">

  📂 ประเภท
  <select id="typeFilter">
    <option value="">-- ทั้งหมด --</option>
    <option value="RE">RE</option>
    <option value="JR">JR</option>
    <option value="JV">JV</option>
    <option value="PP">PP</option>
  </select>

  <button type="button" onclick="loadFiltered()">ค้นหา</button>
</div>

<div style="margin-top:15px;">
  <table id="table"></table>
</div>

</div>

<div class="card" style="text-align:center;">
  <button type="button" onclick="logout()">🚪 ออกจากระบบ</button>
</div>

</div>

<script>
let role="";
let editIndex=null;

window.onload=function(){
  const savedRole=sessionStorage.getItem("role");
  if(savedRole){
    role=savedRole;
    loginBox.style.display="none";
    app.style.display="block";
    loadAll();
  }

  amount.addEventListener("blur", function(){
    const normalized = normalizeAmount(amount.value);
    if(normalized!==null){
      amount.value = normalized;
    }
  });

};

function doLogin(){
  google.script.run.withSuccessHandler(function(r){
    if(!r){ msg.innerText="รหัสไม่ถูกต้อง"; return; }
    role=r;
    sessionStorage.setItem("role", r);
    loginBox.style.display="none";
    app.style.display="block";
    loadAll();
  }).login(password.value.trim());
}

function logout(){
  sessionStorage.removeItem("role");
  role="";
  app.style.display="none";
  loginBox.style.display="block";
}

function clearForm(){
  editIndex=null;
  document.querySelectorAll("input,textarea").forEach(e=>{
    if(e.id!=="password") e.value="";
  });
}

function normalizeAmount(value){
  const raw = String(value || "").trim().replace(/,/g, ".");
  if(!raw){ return ""; }
  if(!/^\d+(\.\d{1,2})?$/.test(raw)){ return null; }
  return Number(raw).toFixed(2);
}

function save(){
  const normalizedAmount = normalizeAmount(amount.value);
  if(normalizedAmount===null){
    alert("จำนวนเงินไม่ถูกต้อง กรุณาใช้รูปแบบ บาท.สตางค์ เช่น 1250.50");
    amount.focus();
    return;
  }

  const p=date.value.split("-");
  const d=p[2]+"/"+p[1]+"/"+p[0];

  const row=[
    d,doc.value,item.value,
    re_detail.value,jr_detail.value,
    jv_detail.value,pp_detail.value,
    normalizedAmount,
    dr.value,cr.value,note.value
  ];

  google.script.run.withSuccessHandler(function(check){
    if(!check || !check.ok){
      alert("ข้อมูลไม่ผ่านการตรวจสอบ:\n- " + ((check && check.errors || ["ไม่ทราบสาเหตุ"]).join("\n- ")));
      return;
    }

    const proceed = function(){
      if(editIndex!==null){
        google.script.run.withSuccessHandler(function(){
          loadAll();
          clearForm();
        }).updateRow(editIndex,row);
      }else{
        google.script.run.withSuccessHandler(function(){
          loadAll();
          clearForm();
        }).addRow(row);
      }
    };

    if(check.duplicate){
      const yes = confirm("พบข้อมูลอาจซ้ำกับแถว " + check.duplicateRow + "\nเลขที่เอกสาร: " + doc.value + "\nต้องการบันทึกต่อหรือไม่?");
      if(!yes) return;
    }

    proceed();
  }).validateAndCheckDuplicate(row, editIndex);
}

function loadAll(){
  google.script.run.withSuccessHandler(show)
    .readAllData();
}

function editRow(i){
  google.script.run.withSuccessHandler(function(data){
    const row = data[i];
    if(!row){ return; }

    const d = String(row[0] || "").split("/");
    if(d.length===3){
      date.value = `${d[2]}-${d[1].padStart(2,"0")}-${d[0].padStart(2,"0")}`;
    }else{
      date.value = "";
    }

    doc.value = row[1] || "";
    item.value = row[2] || "";
    re_detail.value = row[3] || "";
    jr_detail.value = row[4] || "";
    jv_detail.value = row[5] || "";
    pp_detail.value = row[6] || "";
    amount.value = normalizeAmount(row[7]) || "";
    dr.value = row[8] || "";
    cr.value = row[9] || "";
    note.value = row[10] || "";

    editIndex = i;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }).readAllData();
}

function show(data){
  let html=`<tr><th><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>`;
  data[0].forEach(h=>html+="<th>"+h+"</th>");

  if(role==="admin"){
    html+="<th>แก้ไข</th><th>ลบ</th>";
  }

  html+="</tr>";

  for(let i=1;i<data.length;i++){
    html+="<tr>";
    html+=`<td><input type="checkbox" value="${i}"></td>`;
    data[i].forEach(c=>html+="<td>"+c+"</td>");

    if(role==="admin"){
      html+=`<td><button type="button" onclick="editRow(${i})">✏️</button></td>`;
      html+=`<td><button type="button" onclick="deleteRow(${i})">🗑️</button></td>`;
    }

    html+="</tr>";
  }

  table.innerHTML=html;
}

function toggleSelectAll(master){
  const checks = document.querySelectorAll("#table input[type=checkbox]");
  checks.forEach(c => c.checked = master.checked);
}

function deleteRow(i){
  if(confirm("ลบข้อมูล?")){
    google.script.run.withSuccessHandler(loadAll)
      .deleteRow(i);
  }
}

function importCSV(){
  const file=document.getElementById("importFile").files[0];
  if(!file){alert("เลือกไฟล์ก่อน");return;}
  const isXlsx = /\.xlsx$/i.test(file.name);
  if(!isXlsx){
    alert("รองรับเฉพาะไฟล์ .xlsx");
    return;
  }
  const reader=new FileReader();
  reader.onload=function(e){
    google.script.run
      .withSuccessHandler(()=>{ alert("นำเข้าเรียบร้อย"); loadAll(); })
      .withFailureHandler(err=>{ alert("นำเข้าไม่สำเร็จ: "+(err.message||err)); })
      .importData({name:file.name, data:e.target.result, encoding:"base64"});
  };
  reader.readAsDataURL(file);
}

function downloadSelected(){
  const checked=document.querySelectorAll("#table input[type=checkbox]:checked");
  const indexes=[];
  checked.forEach(c=>{
    if(c.id==="selectAll") return;
    const n = parseInt(c.value, 10);
    if(Number.isInteger(n)) indexes.push(n);
  });
  if(indexes.length===0){
    alert("กรุณาเลือกอย่างน้อย 1 รายการก่อนโหลดออก");
    return;
  }

  google.script.run
    .withSuccessHandler(function(r){
    if(!r || !r.data){
      alert("ไม่พบข้อมูลสำหรับดาวน์โหลด");
      return;
    }
    const bin = atob(r.data || "");
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    const blob = new Blob([bytes], { type: r.type || "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const url = URL.createObjectURL(blob);

    const a=document.createElement("a");
    a.href=url;
    a.download=r.name || "export.xlsx";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  })
    .withFailureHandler(function(err){
      alert("โหลดไม่สำเร็จ: " + (err && err.message ? err.message : err));
    })
    .downloadSelected(indexes);
}

function deleteSelected(){
  const checked=document.querySelectorAll("input[type=checkbox]:checked");
  const indexes=[];
  checked.forEach(c=>indexes.push(parseInt(c.value)));
  const filtered = indexes.filter(n=>Number.isInteger(n));
  if(filtered.length===0){ alert("ยังไม่ได้เลือกแถว"); return; }
  if(!confirm("ลบแถวที่เลือก?")) return;
  google.script.run.withSuccessHandler(loadAll)
    .deleteRows(filtered);
}
function toggleTable(){
  const box = document.getElementById("tableBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}
function loadByDate(){

  if(!date.value){
    alert("กรุณาเลือกวันที่ก่อน");
    return;
  }

  const parts = date.value.split("-");
  const formattedDate = parts[2]+"/"+parts[1]+"/"+parts[0];

  google.script.run.withSuccessHandler(function(data){

    const filtered = [data[0]];

    for(let i=1;i<data.length;i++){
      if(data[i][0] === formattedDate){
        filtered.push(data[i]);
      }
    }

    show(filtered);

  }).readAllData();
}
function toggleFilter(){
  const box = document.getElementById("filterBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}
function loadFiltered(){

  const startVal = dateStart.value;
  const endVal   = dateEnd.value;
  const type     = typeFilter.value;

  google.script.run.withSuccessHandler(function(data){

    const result = [data[0]];

    for(let i=1;i<data.length;i++){

      let pass = true;

      if(startVal && endVal){
        const parts = data[i][0].split("/");
        const rowDate = new Date(parts[2], parts[1]-1, parts[0]);
        const start = new Date(startVal);
        const end   = new Date(endVal);

        if(rowDate < start || rowDate > end){
          pass = false;
        }
      }

      if(type){
        const map = {"RE":3,"JR":4,"JV":5,"PP":6};
        if(!data[i][map[type]]){
          pass = false;
        }
      }

      if(pass){
        result.push(data[i]);
      }
    }

    show(result);

  }).readAllData();
}
let tableVisible = false;

function toggleAll(){

  const tableBox = document.getElementById("table").parentElement;

  if(!tableVisible){
    google.script.run.withSuccessHandler(function(data){
      show(data);
      tableBox.style.display = "block";
      tableVisible = true;
    }).readAllData();
  } else {
    tableBox.style.display = "none";
    tableVisible = false;
  }

}

</script>

</body>
</html>
