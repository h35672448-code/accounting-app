<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบทะเบียนคุมบันทึกการปรับปรุงรายการบัญชี</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <main class="app-wrap">
    <header class="header card glass">
      <div class="logo-wrap">
        <img src="./src/javascript.svg" alt="โลโก้ระบบ" class="logo">
      </div>
      <div>
        <h1>ระบบทะเบียนคุมบันทึกการปรับปรุงรายการบัญชี</h1>
        <p class="subtitle">Accounting Register Web Application</p>
      </div>
    </header>

    <section class="card glass">
      <h2>ฟอร์มบันทึกข้อมูล</h2>
      <form id="recordForm" class="form-grid" autocomplete="off">
        <label>
          วันที่
          <input id="date" name="date" type="date" required>
        </label>
        <label>
          รายการ
          <input id="item" name="item" type="text" placeholder="เช่น ปรับปรุงค่าใช้จ่าย" required>
        </label>
        <label>
          เลขที่เอกสาร
          <input id="docNo" name="docNo" type="text" placeholder="DOC-001">
        </label>
        <label>
          RE
          <input id="RE" name="RE" type="text" placeholder="RE-001">
        </label>
        <label>
          JR
          <input id="JR" name="JR" type="text" placeholder="JR-001">
        </label>
        <label>
          JV
          <input id="JV" name="JV" type="text" placeholder="JV-001">
        </label>
        <label>
          PP
          <input id="PP" name="PP" type="text" placeholder="PP-001">
        </label>
        <label>
          จำนวนเงิน
          <input id="amount" name="amount" type="number" min="0" step="0.01" placeholder="0.00">
        </label>
        <label>
          Dr
          <input id="Dr" name="Dr" type="text" placeholder="รหัสเดบิต">
        </label>
        <label>
          Cr
          <input id="Cr" name="Cr" type="text" placeholder="รหัสเครดิต">
        </label>
        <label class="span-2">
          หมายเหตุ
          <textarea id="note" name="note" rows="2" placeholder="รายละเอียดเพิ่มเติม"></textarea>
        </label>
        <div class="span-2 actions-row">
          <button type="submit" class="btn btn-save">บันทึกข้อมูล</button>
        </div>
      </form>
    </section>

    <section class="card glass">
      <h2>กรองข้อมูล</h2>
      <div class="filter-grid">
        <label>
          ประเภท (รายการ)
          <select id="typeFilter">
            <option value="">ทั้งหมด</option>
          </select>
        </label>
        <label>
          วันที่เริ่มต้น
          <input id="startDate" type="date">
        </label>
        <label>
          วันที่สิ้นสุด
          <input id="endDate" type="date">
        </label>
      </div>
      <div class="actions-row">
        <button id="showAllBtn" type="button" class="btn btn-view-all">ดูทั้งหมด</button>
        <button id="dateRangeBtn" type="button" class="btn btn-view-range">ดูช่วงเวลา</button>
      </div>
    </section>

    <section class="card glass">
      <h2>จัดการไฟล์ Excel</h2>
      <div class="actions-row">
        <button id="exportBtn" type="button" class="btn btn-export">โหลดออก Excel</button>
        <button id="importBtn" type="button" class="btn btn-import">โหลดเข้า Excel</button>
        <input id="importFile" type="file" accept=".xlsx,.xls" hidden>
      </div>
      <p class="hint">หัวคอลัมน์ในไฟล์ต้องตรงกับระบบ: วันที่, รายการ, เลขที่เอกสาร, RE, JR, JV, PP, จำนวนเงิน, Dr, Cr, หมายเหตุ</p>
    </section>

    <section class="card glass">
      <div class="table-header">
        <h2>ตารางรายการ</h2>
        <span id="recordCount">0 รายการ</span>
      </div>
      <div class="table-wrap">
        <table id="recordsTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
