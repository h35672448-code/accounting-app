<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768">
  <defs>
    <style>
      .t { font: 700 24px 'TH Sarabun New', 'Sarabun', sans-serif; fill: #111827; }
      .s { font: 700 20px 'TH Sarabun New', 'Sarabun', sans-serif; fill: #111827; }
      .box { fill:#dbeafe; stroke:#374151; stroke-width:2; rx:14; }
      .d { fill:#fde68a; stroke:#374151; stroke-width:2; }
      .e { fill:#dcfce7; stroke:#374151; stroke-width:2; }
      .db { fill:#fecaca; stroke:#374151; stroke-width:2; }
      .a { stroke:#111827; stroke-width:2; fill:none; marker-end:url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="683" y="36" text-anchor="middle" class="t">ผังงานระบบทะเบียนคุมบัญชี (ขนาดแคปจอ)</text>

  <ellipse cx="180" cy="90" rx="95" ry="32" class="e"/>
  <text x="180" y="99" text-anchor="middle" class="s">เริ่มต้น</text>

  <rect x="70" y="145" width="220" height="52" class="box"/>
  <text x="180" y="178" text-anchor="middle" class="s">เปิดเว็บแอป</text>

  <rect x="35" y="235" width="290" height="52" class="box"/>
  <text x="180" y="268" text-anchor="middle" class="s">แสดงหน้าเข้าสู่ระบบ</text>

  <rect x="35" y="325" width="290" height="52" class="box"/>
  <text x="180" y="358" text-anchor="middle" class="s">ผู้ใช้กรอกรหัสผ่าน</text>

  <polygon points="180,425 310,490 180,555 50,490" class="d"/>
  <text x="180" y="498" text-anchor="middle" class="s">รหัสผ่านถูกต้อง?</text>

  <rect x="390" y="465" width="250" height="52" class="box"/>
  <text x="515" y="498" text-anchor="middle" class="s">แจ้งรหัสไม่ถูกต้อง</text>

  <rect x="740" y="465" width="220" height="52" class="box"/>
  <text x="850" y="498" text-anchor="middle" class="s">กำหนดสิทธิ์</text>

  <polygon points="1060,425 1210,490 1060,555 910,490" class="d"/>
  <text x="1060" y="498" text-anchor="middle" class="s">ประเภทผู้ใช้</text>

  <rect x="900" y="590" width="230" height="52" class="box"/>
  <text x="1015" y="623" text-anchor="middle" class="s">Admin: เพิ่ม/แก้/ลบ/นำเข้า/ส่งออก</text>

  <rect x="1140" y="590" width="190" height="52" class="box"/>
  <text x="1235" y="623" text-anchor="middle" class="s">User: เพิ่ม/ดู/ส่งออก</text>

  <rect x="835" y="675" width="220" height="50" class="box"/>
  <text x="945" y="706" text-anchor="middle" class="s">ประมวลผลและบันทึก</text>

  <ellipse cx="1180" cy="700" rx="145" ry="28" class="db"/>
  <text x="1180" y="708" text-anchor="middle" class="s">ไฟล์ข้อมูลบัญชี</text>

  <path d="M180,122 L180,145" class="a"/>
  <path d="M180,197 L180,235" class="a"/>
  <path d="M180,287 L180,325" class="a"/>
  <path d="M180,377 L180,425" class="a"/>

  <path d="M310,490 L390,490" class="a"/>
  <text x="340" y="478" class="s">ไม่</text>
  <path d="M515,465 L515,395 L180,395 L180,425" class="a"/>

  <path d="M310,490 L740,490" class="a"/>
  <text x="640" y="478" class="s">ใช่</text>
  <path d="M960,490 L910,490" class="a"/>
  <path d="M1210,490 L1235,590" class="a"/>
  <path d="M1060,555 L1015,590" class="a"/>
  <path d="M1015,642 L945,675" class="a"/>
  <path d="M1235,642 L1180,672" class="a"/>
</svg>
